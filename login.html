<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclaim</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="log-in-container">

        <!--Log-in Page-->
        <div class="login-content">

            <div class="header">
                <h3>Welcome to the School</h3>
                <h1>LIBRARY MANAGEMENT SYSTEM</h1>
            </div>

            <div class="login-form">

                <div class="form-title">
                    <img src="Images/logo.jpeg" alt="Reclaim">
                    <h2>LOG INTO THE LIBRARY</h2>
                </div>
                <form action="login.php" method="post">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" placeholder="Enter email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter password" id="password" name="password" required>
                    </div>

                    <div class="sign-in">
                        <button type="submit">Sign In</button>
                    </div>

                    <div class="form-text">
                        <p>No account yet? <a href="register.html">Register.</a></p>
                    </div>
                </form>

            </div>

        </div>



        <!--Pop ups-->
        <div id="register-confirmation" class="modal">

            <div class="register-modal">

                <div class="card">
                    <img src="img/avatar.png" alt="Admin">
                    <h3>Admin</h3>
                </div>

                <div class="card">
                    <img src="img/avatar.png" alt="Student">
                    <h3>Student</h3>
                </div>

            </div>

        </div>

</body>

</html>
