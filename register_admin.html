<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclaim</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="register-container">

        <!--Registration Page-->
        <div id="admin_registration" class="registration_page">
            <form action="register_admin.php" method="post">
                <div class="form-title">
                    <img src="Images/logo.jpeg" alt="Reclaim">
                    <h2>ADMIN - REGISTRATION</h2>
                </div>
                <div class="registration-content">

                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" placeholder="Enter email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter password" id="password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="Enter first name" id="first_name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Enter last name" id="last_name" name="last_name" required>
                    </div>

                    <div class="form-action">
                        <button type="submit">Submit</button>
                    </div>

                </div>
            </form>
        </div>

    </div>
</body>

</html>
