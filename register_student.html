<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclaim</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="register-container">

        <div id="student_registration" class="registration_page">
            <form action="register_student.php" method="post">
                <div class="form-title">
                    <img src="Images/logo.jpeg" alt="Reclaim">
                    <h2>STUDENT - REGISTRATION</h2>
                </div>
                <div class="registration-content">

                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" placeholder="Enter email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter password" id="password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="Enter first name" id="first_name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Enter last name" id="last_name" name="last_name" required>
                    </div>

                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" min="1" max="5" id="year" name="year" required>
                    </div>

                    <div class="form-group">
                        <label>Course</label>
                        <select name="course" id="dropdown" name="course" required>
                            <optgroup label="CCE">
                                <option value="BSCS">BSCS</option>
                                <option value="BSIT">BSIT</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-action">
                        <button type="submit">Submit</button>
                    </div>

                </div>
            </form>
        </div>

    </div>
</body>

</html>
